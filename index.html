<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discount Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
 <link rel="icon" type="image/png" href="./dcals.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c0f;
    --card: #13151a;
    --card2: #1a1d25;
    --accent: #c6f135;
    --accent2: #f1e535;
    --muted: #3a3e4a;
    --text: #f0f2f5;
    --sub: #7a7f8e;
    --red: #ff5e5e;
    --border: rgba(255,255,255,0.06);
  }

  body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 420px; height: 420px;
    background: var(--accent);
    top: -120px; right: -80px;
  }
  body::after {
    width: 360px; height: 360px;
    background: #35a1f1;
    bottom: -100px; left: -80px;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(198,241,53,0.12);
    border: 1px solid rgba(198,241,53,0.25);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 18px;
  }
  .badge span { font-size: 13px; }

  h1 {
    font-size: clamp(2rem, 8vw, 2.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }
  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .subtitle {
    color: var(--sub);
    font-size: 14px;
    font-weight: 400;
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 14px;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--sub);
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .symbol {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--sub);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: var(--card2);
    border: 1.5px solid var(--muted);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    padding: 13px 13px 13px 30px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(198,241,53,0.12);
  }
  input[type="number"]::placeholder { color: var(--muted); }

  /* quick discount chips */
  .chips {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .chip-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--sub);
    width: 100%;
    margin-bottom: 2px;
  }
  .chip {
    background: var(--card2);
    border: 1.5px solid var(--muted);
    border-radius: 8px;
    color: var(--sub);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover, .chip.active {
    background: rgba(198,241,53,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .calc-btn {
    width: 100%;
    background: var(--accent);
    color: #0b0c0f;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
    text-transform: uppercase;
  }
  .calc-btn:hover {
    background: var(--accent2);
    box-shadow: 0 8px 28px rgba(198,241,53,0.28);
    transform: translateY(-1px);
  }
  .calc-btn:active { transform: scale(0.98); }

  /* results */
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }
  .results.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .result-card {
    border-radius: 16px;
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
  }
  .result-card.you-save {
    background: rgba(255,94,94,0.1);
    border: 1.5px solid rgba(255,94,94,0.25);
  }
  .result-card.you-pay {
    background: rgba(198,241,53,0.1);
    border: 1.5px solid rgba(198,241,53,0.3);
  }

  .result-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .you-save .result-label { color: var(--red); }
  .you-pay .result-label { color: var(--accent); }

  .result-amount {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .you-save .result-amount { color: var(--red); }
  .you-pay .result-amount { color: var(--accent); }

  .result-icon {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 22px;
    opacity: 0.3;
  }

  .summary-bar {
    margin-top: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s 0.1s ease, transform 0.35s 0.1s ease;
    pointer-events: none;
  }
  .summary-bar.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .summary-bar .s-label {
    font-size: 12px;
    color: var(--sub);
    font-family: 'DM Mono', monospace;
  }
  .summary-bar .s-val {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .sep { width: 1px; height: 28px; background: var(--border); }

  /* error shake */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    75%{transform:translateX(5px)}
  }
  .shake { animation: shake 0.3s ease; }
</style>
</head>
<body>
<div class="container">
  <div class="badge"><span>🏷️</span> Discount Calculator</div>
  <h1>How much<br/>do you <em>save?</em></h1>
  <p class="subtitle">// enter price + discount → instant answer</p>

  <div class="card">
    <div class="fields">
      <div class="field">
        <label>Original Price</label>
        <div class="input-wrap">
          <span class="symbol">₹</span>
          <input type="number" id="price" placeholder="0" min="0" />
        </div>
      </div>
      <div class="field">
        <label>Discount</label>
        <div class="input-wrap">
          <span class="symbol">%</span>
          <input type="number" id="discount" placeholder="0" min="0" max="100" />
        </div>
      </div>
    </div>

    <div class="chips">
      <span class="chip-label">Quick select</span>
      <span class="chip" data-val="5">5%</span>
      <span class="chip" data-val="10">10%</span>
      <span class="chip" data-val="15">15%</span>
      <span class="chip" data-val="20">20%</span>
      <span class="chip" data-val="25">25%</span>
      <span class="chip" data-val="30">30%</span>
      <span class="chip" data-val="50">50%</span>
    </div>

    <button class="calc-btn" onclick="calculate()">Calculate →</button>
  </div>

  <div class="results" id="results">
    <div class="result-card you-save">
      <div class="result-label">You Save</div>
      <div class="result-amount" id="saved">—</div>
      <div class="result-icon">💸</div>
    </div>
    <div class="result-card you-pay">
      <div class="result-label">You Pay</div>
      <div class="result-amount" id="pay">—</div>
      <div class="result-icon">✅</div>
    </div>
  </div>

  <div class="summary-bar" id="summary">
    <div>
      <div class="s-label">Original</div>
      <div class="s-val" id="s-orig">—</div>
    </div>
    <div class="sep"></div>
    <div>
      <div class="s-label">Discount</div>
      <div class="s-val" id="s-disc">—</div>
    </div>
    <div class="sep"></div>
    <div>
      <div class="s-label">Savings %</div>
      <div class="s-val" id="s-pct">—</div>
    </div>
  </div>
</div>

<script>
  const fmt = n => '₹' + n.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  // Chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      document.getElementById('discount').value = chip.dataset.val;
    });
  });

  // Sync chip highlight with manual input
  document.getElementById('discount').addEventListener('input', function() {
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.dataset.val === this.value);
    });
  });

  function calculate() {
    const price = parseFloat(document.getElementById('price').value);
    const disc = parseFloat(document.getElementById('discount').value);

    if (isNaN(price) || price <= 0 || isNaN(disc) || disc < 0 || disc > 100) {
      const card = document.querySelector('.card');
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 350);
      return;
    }

    const saved = price * disc / 100;
    const pay = price - saved;

    document.getElementById('saved').textContent = fmt(saved);
    document.getElementById('pay').textContent = fmt(pay);
    document.getElementById('s-orig').textContent = fmt(price);
    document.getElementById('s-disc').textContent = disc + '%';
    document.getElementById('s-pct').textContent = disc.toFixed(1) + '%';

    document.getElementById('results').classList.add('show');
    document.getElementById('summary').classList.add('show');
  }

  // Enter key trigger
  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
